services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portafolio
      POSTGRES_USER: portafolio
      POSTGRES_PASSWORD: portafolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portafolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: dev-compose-secret-key-change-me-0123456789abcdef
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,api"
      DATABASE_URL: "postgres://portafolio:portafolio@db:5432/portafolio"
      DJANGO_SETTINGS_MODULE: portfolio_project.settings.production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
